<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NYC Taxi Explorer — Urban Mobility Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#080b10;--bg2:#0d1117;--surface:#111820;--card:#141c26;
  --border:#1c2736;--border2:#243040;--amber:#f0b429;
  --amber-dim:rgba(240,180,41,.15);--cyan:#22d3ee;
  --cyan-dim:rgba(34,211,238,.12);--green:#10b981;--red:#f43f5e;
  --text:#dde4ee;--text2:#8a9ab0;--text3:#4a5a70;
  --display:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:6px;--r2:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.landing{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2.5rem;position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(8,11,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.brand{font-family:var(--display);font-size:.9rem;font-weight:800;letter-spacing:.04em;color:var(--text)}
.brand em{color:var(--amber);font-style:normal}
.topbar-right{display:flex;align-items:center;gap:1.5rem}
.live-pill{display:flex;align-items:center;gap:.45rem;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:.3rem .75rem;font-family:var(--mono);font-size:.68rem;color:var(--text2)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.cta-btn{background:var(--amber);color:#0a0a00;border:none;border-radius:var(--r);padding:.5rem 1.2rem;font-family:var(--display);font-size:.8rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .15s,box-shadow .15s}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,180,41,.3)}
.hero{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:9rem 2rem 5rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.2;mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,black 40%,transparent 100%)}
.hero::after{content:'';position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:700px;height:400px;background:radial-gradient(ellipse,rgba(240,180,41,.07) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-family:var(--mono);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:1.25rem;display:flex;align-items:center;gap:.6rem;opacity:0;animation:fadeUp .6s ease forwards .1s}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:28px;height:1px;background:var(--amber);opacity:.5}
.hero-title{font-family:var(--display);font-size:clamp(2.8rem,7vw,5.5rem);font-weight:800;line-height:1.05;letter-spacing:-.02em;color:var(--text);margin-bottom:1.5rem;opacity:0;animation:fadeUp .65s ease forwards .2s}
.hero-title .line2{color:var(--amber);display:block}
.hero-sub{font-size:1rem;color:var(--text2);max-width:520px;line-height:1.7;margin-bottom:2.5rem;opacity:0;animation:fadeUp .65s ease forwards .35s}
.hero-actions{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp .65s ease forwards .5s}
.btn-primary{background:var(--amber);color:#0a0a00;border:none;border-radius:var(--r);padding:.75rem 1.8rem;font-family:var(--display);font-size:.9rem;font-weight:700;cursor:pointer;text-decoration:none;transition:transform .15s,box-shadow .2s;display:inline-flex;align-items:center;gap:.4rem}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(240,180,41,.35)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--r);padding:.75rem 1.8rem;font-family:var(--display);font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s;display:inline-flex;align-items:center;gap:.4rem}
.btn-ghost:hover{border-color:var(--amber);color:var(--amber)}
.hero-stats{display:flex;gap:3rem;margin-top:4rem;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp .65s ease forwards .65s}
.hero-stat-item{text-align:center}
.hero-stat-num{font-family:var(--mono);font-size:1.6rem;font-weight:500;color:var(--amber);line-height:1;display:block}
.hero-stat-label{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:.3rem;display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.features{background:var(--bg2);border-top:1px solid var(--border);padding:5rem 2.5rem}
.section-header{text-align:center;margin-bottom:3.5rem}
.section-tag{font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:.8rem;display:block}
.section-title{font-family:var(--display);font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1.2}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;max-width:1100px;margin:0 auto;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.feature-card{background:var(--card);padding:2rem 1.75rem;transition:background .2s}
.feature-card:hover{background:rgba(240,180,41,.04)}
.feature-icon{font-size:1.4rem;margin-bottom:1rem;display:block}
.feature-title{font-family:var(--display);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:.5rem}
.feature-desc{font-size:.83rem;color:var(--text2);line-height:1.65}
.insights-preview{padding:5rem 2.5rem;background:var(--bg);border-top:1px solid var(--border)}
.insights-inner{max-width:1100px;margin:0 auto}
.insights-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:3rem}
.insight-big{grid-row:span 2;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:2rem;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.insight-big::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--amber),var(--cyan))}
.insight-small{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;display:flex;align-items:center;gap:1rem;transition:border-color .2s,transform .2s}
.insight-small:hover{border-color:var(--border2);transform:translateY(-1px)}
.insight-small-icon{width:40px;height:40px;border-radius:var(--r);background:var(--amber-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.insight-small-icon.cyan{background:var(--cyan-dim)}
.insight-small-label{font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.25rem}
.insight-small-val{font-family:var(--mono);font-size:1.2rem;font-weight:500;color:var(--text)}
.insight-small-val span{font-size:.8rem;color:var(--text2);font-weight:400}
.insight-big-title{font-family:var(--display);font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:.5rem}
.insight-big-sub{font-size:.83rem;color:var(--text2);line-height:1.6;margin-bottom:1.5rem}
.insight-big-num{font-family:var(--mono);font-size:3.5rem;font-weight:500;color:var(--amber);line-height:1;letter-spacing:-.03em}
.insight-big-numlab{font-family:var(--mono);font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:.4rem}
.mini-bars{display:flex;align-items:flex-end;gap:3px;height:48px;margin-top:1.5rem}
.mini-bar{flex:1;background:var(--amber-dim);border-radius:2px 2px 0 0;transition:background .2s}
.mini-bar.hi{background:var(--amber)}
.cta-band{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:4rem 2.5rem;text-align:center}
.cta-band h2{font-family:var(--display);font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;color:var(--text);margin-bottom:.75rem;letter-spacing:-.02em}
.cta-band p{color:var(--text2);font-size:.9rem;margin-bottom:1.75rem}
.dashboard{display:none;flex-direction:column;min-height:100vh}
.dashboard.active{display:flex}
.dash-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.dash-logo{font-family:var(--display);font-size:.85rem;font-weight:800;color:var(--text)}
.dash-logo em{color:var(--amber);font-style:normal}
.dash-header-right{font-family:var(--mono);font-size:.68rem;color:var(--text2);display:flex;align-items:center;gap:1.25rem}
.dash-back{background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:var(--r);padding:.3rem .8rem;font-family:var(--mono);font-size:.68rem;cursor:pointer;transition:border-color .2s,color .2s}
.dash-back:hover{border-color:var(--amber);color:var(--amber)}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{font-family:var(--mono);font-size:.68rem;padding:.7rem 1.25rem;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.tab-content{display:none}
.tab-content.active{display:block}
.dash-main{padding:1.5rem 2rem;max-width:1600px;margin:0 auto;width:100%;flex:1}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem;margin-bottom:1.5rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.1rem 1.25rem;position:relative;overflow:hidden;transition:border-color .2s;cursor:default}
.kpi-card:hover{border-color:var(--border2)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--amber);transform:scaleX(0);transform-origin:left;transition:transform .25s ease}
.kpi-card:hover::before{transform:scaleX(1)}
.kpi-label{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:.5rem}
.kpi-value{font-family:var(--mono);font-size:1.45rem;font-weight:500;color:var(--amber);line-height:1}
.kpi-sub{font-size:.72rem;color:var(--text3);margin-top:.3rem}
.sec-title{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.14em;color:var(--amber);margin-bottom:.75rem;display:flex;align-items:center;gap:.6rem}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.1rem 1.1rem .9rem}
.chart-card.full{grid-column:1/-1}
.chart-card-title{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;color:var(--text2);margin-bottom:.75rem}
.chart-wrap{position:relative;height:220px}
.chart-wrap.tall{height:280px}
.insight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:.75rem;margin-bottom:1.5rem}
.insight-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:var(--r2);padding:1rem 1.1rem;transition:transform .2s}
.insight-card:hover{transform:translateY(-2px)}
.insight-card.yellow{border-left-color:var(--amber)}
.insight-card.green{border-left-color:var(--green)}
.insight-card.red{border-left-color:var(--red)}
.insight-icon{margin-bottom:.4rem}
.insight-headline{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:.2rem}
.insight-body{font-size:.78rem;color:var(--text2);line-height:1.5}
.filter-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:.75rem 1rem;display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;margin-bottom:1rem}
.filter-bar label{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-right:.2rem}
.filter-bar select,.filter-bar input{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:.32rem .55rem;font-family:var(--mono);font-size:.72rem;cursor:pointer;outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--amber)}
.btn{background:var(--amber);color:#0a0a00;border:none;border-radius:var(--r);padding:.36rem 1rem;font-family:var(--mono);font-size:.7rem;font-weight:700;cursor:pointer;transition:opacity .15s,transform .12s;letter-spacing:.04em}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn.secondary{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.btn.secondary:hover{border-color:var(--border2);color:var(--text)}
.table-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);margin-bottom:1.25rem}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface);font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;color:var(--text2);padding:.65rem .9rem;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s}
thead th:hover{color:var(--amber)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(240,180,41,.03)}
tbody td{padding:.55rem .9rem;font-family:var(--mono);font-size:.7rem;color:var(--text);white-space:nowrap}
.badge{display:inline-block;padding:.12rem .45rem;border-radius:3px;font-size:.63rem;font-weight:700;letter-spacing:.04em}
.badge-v1{background:rgba(34,211,238,.15);color:var(--cyan)}
.badge-v2{background:var(--amber-dim);color:var(--amber)}
.pagination{display:flex;gap:.35rem;align-items:center;justify-content:flex-end;padding:.5rem .25rem}
.page-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:var(--r);padding:.25rem .65rem;font-family:var(--mono);font-size:.68rem;cursor:pointer;transition:border-color .15s,color .15s}
.page-btn:hover:not(:disabled){border-color:var(--border2);color:var(--text)}
.page-btn.active{background:var(--amber);color:#0a0a00;border-color:var(--amber);font-weight:700}
.page-btn:disabled{opacity:.3;cursor:default}
.page-info{font-family:var(--mono);font-size:.68rem;color:var(--text3);padding:0 .25rem}
.anomaly-tag{display:inline-block;background:rgba(244,63,94,.12);color:var(--red);border-radius:3px;padding:.1rem .38rem;font-size:.63rem;font-family:var(--mono);margin:.08rem}
.map-container{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);height:380px;position:relative;overflow:hidden;margin-bottom:1rem}
#scatter-canvas{width:100%;height:100%;position:absolute;inset:0}
.map-overlay{position:absolute;top:.9rem;left:.9rem;font-family:var(--mono);font-size:.68rem;color:var(--amber);background:rgba(8,11,16,.85);padding:.35rem .65rem;border-radius:var(--r);border:1px solid var(--border);backdrop-filter:blur(4px)}
.loading{display:flex;align-items:center;justify-content:center;padding:2rem;font-family:var(--mono);font-size:.72rem;color:var(--text2);gap:.6rem}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
#back-to-top{position:fixed;bottom:1.5rem;right:1.5rem;width:40px;height:40px;background:var(--amber);color:#0a0a00;border:none;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;z-index:300;box-shadow:0 4px 16px rgba(240,180,41,.3)}
#back-to-top.visible{opacity:1;transform:translateY(0)}
@media(max-width:900px){
  .chart-grid,.chart-grid-3{grid-template-columns:1fr}
  .chart-card.full{grid-column:1}
  .insights-layout{grid-template-columns:1fr}
  .insight-big{grid-row:auto}
  .topbar{padding:1rem 1.25rem}
  .hero{padding:8rem 1.25rem 4rem}
  .features,.insights-preview,.cta-band{padding:3.5rem 1.25rem}
  .dash-main{padding:1rem}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .hero-stats{gap:1.75rem}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .hero-title{font-size:2.2rem}
  .features-grid{grid-template-columns:1fr}
  .hero-stats{gap:1.25rem}
}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing" class="landing">
  <nav class="topbar">
    <div class="brand"><em>NYC</em> TAXI EXPLORER</div>
    <div class="topbar-right">
      <div class="live-pill">
        <span class="live-dot"></span>
        <span id="lp-status">connecting...</span>
      </div>
      <a href="#" class="cta-btn" onclick="openDashboard();return false;">Open Dashboard</a>
    </div>
  </nav>
